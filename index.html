<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>US Climate Futures</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/topojson@3/dist/topojson.min.js"></script>
</head>
<body>
    <div id="app">
        <div id="header">
            <h1>U.S. Climate Futures</h1>
            <p>Explore how temperature and precipitation across the United States change under different emissions scenarios through 2100.</p>
        </div>

        <div id="controls">
            <div class="control-group">
                <label>Variable</label>
                <div id="variable-toggle">
                    <button class="toggle-btn active" data-var="temperature">Temperature</button>
                    <button class="toggle-btn" data-var="precipitation">Precipitation</button>
                </div>
            </div>

            <div class="control-group">
                <label>Scenario</label>
                <select id="ssp-select">
                    <option value="historical">Historical (1950–2014)</option>
                    <option value="ssp126">SSP1-2.6 (Optimistic)</option>
                    <option value="ssp245">SSP2-4.5 (Middle Road)</option>
                    <option value="ssp585" selected>SSP5-8.5 (Worst Case)</option>
                </select>
            </div>

            <div class="control-group">
                <label>Year: <span id="year-display">2015</span></label>
                <div style="display: flex; gap: 8px; align-items: center;">
                    <input type="range" id="year-slider" min="2015" max="2100" value="2015" step="1">
                    <input type="number" id="year-input" min="2015" max="2100" value="2015">
                </div>
            </div>

            <div class="control-group" id="month-control">
                <label>Month</label>
                <div id="month-picker">
                    <button class="month-btn active" data-month="0">Annual</button>
                    <button class="month-btn" data-month="1">Jan</button>
                    <button class="month-btn" data-month="2">Feb</button>
                    <button class="month-btn" data-month="3">Mar</button>
                    <button class="month-btn" data-month="4">Apr</button>
                    <button class="month-btn" data-month="5">May</button>
                    <button class="month-btn" data-month="6">Jun</button>
                    <button class="month-btn" data-month="7">Jul</button>
                    <button class="month-btn" data-month="8">Aug</button>
                    <button class="month-btn" data-month="9">Sep</button>
                    <button class="month-btn" data-month="10">Oct</button>
                    <button class="month-btn" data-month="11">Nov</button>
                    <button class="month-btn" data-month="12">Dec</button>
                </div>
            </div>
        </div>

        <div id="reset-bar" class="hidden">
            <button id="reset-btn">✕ Exit Mode</button>
        </div>

        <div id="map-container">
            <div id="mode-indicator"></div>
            <svg id="map"></svg>
        </div>

        <div id="legend">
            <div id="legend-label"></div>
            <svg id="legend-svg"></svg>
            <p id="legend-note">Colors show change relative to each state's 1995–2014 average, not absolute temperature.</p>
        </div>

        <div id="sidebar" class="hidden">
            <h2 id="state-name">State Name</h2>
            <div id="state-stats"></div>
            <button id="focus-btn">Focus on this state</button>
            <button id="compare-btn">Compare with another state</button>
            <button id="close-sidebar">✕</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
